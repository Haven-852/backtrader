version: '3.8'

services:
  # Frontend - Vue 3 + Vite (仿 Yuxi 风格)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: backtrader-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:8000
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - backtrader-network

  # Backend - FastAPI (Yuxi 风格后端)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backtrader-backend
    ports:
      - "8000:8000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=quant
      - POSTGRES_PASSWORD=backtrader123
      - POSTGRES_DB=backtrader
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - INFLUX_URL=http://influxdb:8086
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
      - influxdb
    restart: unless-stopped
    networks:
      - backtrader-network

  # Storage Layer (从 docker-compose.storage.yml 合并)
  influxdb:
    image: influxdb:2.7
    container_name: backtrader-influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - ./data/influxdb:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=backtrader123
      - DOCKER_INFLUXDB_INIT_ORG=quant
      - DOCKER_INFLUXDB_INIT_BUCKET=market_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=supersecretadmin token
    restart: unless-stopped
    networks:
      - backtrader-network

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: backtrader-postgres
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=quant
      - POSTGRES_PASSWORD=backtrader123
      - POSTGRES_DB=backtrader
    command: postgres -c shared_preload_libraries=timescaledb
    restart: unless-stopped
    networks:
      - backtrader-network

  redis:
    image: redis:7-alpine
    container_name: backtrader-redis
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - backtrader-network

  minio:
    image: minio/minio
    container_name: backtrader-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      - MINIO_ROOT_USER=quant
      - MINIO_ROOT_PASSWORD=backtrader123
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - backtrader-network

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: backtrader-clickhouse
    ports:
      - "18123:8123"
      - "19000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped
    networks:
      - backtrader-network

  # Nginx for production (optional, for serving built Vue)
  nginx:
    image: nginx:alpine
    container_name: backtrader-nginx
    ports:
      - "8080:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
    restart: unless-stopped
    networks:
      - backtrader-network

networks:
  backtrader-network:
    driver: bridge

volumes:
  influxdb-data:
  postgres-data:
  redis-data:
  minio-data:
  clickhouse-data:
